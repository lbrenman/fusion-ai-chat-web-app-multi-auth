<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fusion AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #181c27;
      --border:    #2a3050;
      --accent:    #4f7cff;
      --text:      #e8eaf2;
      --text-muted:#7880a0;
      --text-dim:  #4a5070;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Subtle background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(79,124,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,124,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow orb */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(79,124,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    }

    .logo {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 32px rgba(79,124,255,0.3);
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(79,124,255,0.35);
    }

    .login-btn:hover {
      background: #3d68ee;
      box-shadow: 0 6px 28px rgba(79,124,255,0.45);
    }

    .login-btn:active { transform: scale(0.98); }

    .features {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 36px;
      text-align: left;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13.5px;
      color: var(--text-muted);
    }

    .feature-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: rgba(79,124,255,0.1);
      border: 1px solid rgba(79,124,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Error banner */
    .error-banner {
      background: rgba(255,79,106,0.1);
      border: 1px solid rgba(255,79,106,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #ff8096;
      margin-bottom: 20px;
      display: none;
    }
    .error-banner.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">✦</div>
    <h1>Fusion <span>AI</span></h1>
    <p class="subtitle">Your intelligent assistant powered by<br>Axway Amplify Fusion</p>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">💬</div>
        Persistent conversation history
      </div>
      <div class="feature">
        <div class="feature-icon">🧠</div>
        Multi-turn context awareness
      </div>
      <div class="feature">
        <div class="feature-icon">🔐</div>
        Secure OAuth 2.0 login
      </div>
    </div>

    <div class="error-banner" id="error-banner"></div>

    <a href="/login" class="login-btn">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6 14H3a1 1 0 01-1-1V3a1 1 0 011-1h3M10 11l3-3-3-3M13 8H6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Sign in to continue
    </a>

    <div class="footer">Powered by Axway Amplify Fusion</div>
  </div>

  <script>
    // Show auth error if redirected back with one
    const params = new URLSearchParams(window.location.search);
    const err = params.get('auth_error');
    if (err) {
      const banner = document.getElementById('error-banner');
      banner.textContent = '⚠️ ' + decodeURIComponent(err);
      banner.classList.add('visible');
      window.history.replaceState({}, '', '/');
    }
  </script>
</body>
</html>
